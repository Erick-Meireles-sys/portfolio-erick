<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecurePass | Gerador de Senhas</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🔐 SecurePass</h1>
<p class="subtitle">Gerador moderno de senhas seguras</p>

<div class="senha-box">

<input id="senha" readonly>

<button id="copiar">📋</button>

</div>


<div class="config">

<label>Tamanho da senha</label>

<input type="range" min="4" max="30" value="12" id="tamanho">

<span id="valorTamanho">12</span>

</div>


<div class="opcoes">

<label><input type="checkbox" id="maiusculas" checked> Letras Maiúsculas</label>

<label><input type="checkbox" id="numeros" checked> Números</label>

<label><input type="checkbox" id="simbolos" checked> Símbolos</label>

</div>


<button id="gerar">Gerar Senha</button>

<div class="forca">

<div id="barra"></div>

<p id="nivel"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
